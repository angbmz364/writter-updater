<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple web app for show in the page what did you write">
    <title>WritterUpdater - By SaskDev</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div id="output-container">
            <p id="output">brat and it’s completely different but also still brat</p>
        </div>
        <section>
            <input 
            type="text" 
            id="input" 
            placeholder="Type something fun here" 
            value="brat and it’s completely different but also still brat">
            <small>Take A Screenshot To Save</small>
        </section>
    </main>
    <footer>
        <small>2026 &copy; Made By SaskDev</small>
        <script src="scripts.js"></script>
    </footer>
